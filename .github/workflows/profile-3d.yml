name: GitHub Profile 3D Contrib

on:
  # update once a day
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  # también al pushear a master (genera el SVG la primera vez)
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # genera los SVG 3D en profile-3d-contrib/  (no requiere secrets)
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # commitea los SVG generados a master ([skip ci] evita re-disparar workflows)
      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git diff --staged --quiet || git commit -m "🧊 Update 3D contrib [skip ci]"
          git push
