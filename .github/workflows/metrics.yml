name: Metrics

on:
  # update once a day
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # generates github-metrics.svg and commits it to this repo (master branch)
      - name: generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # 👉 PAT clásico con scope read:user (y public_repo). Guardalo como secret METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires

          # lenguajes más usados
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # hábitos de código (¿programás de día o de noche?)
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_facts: yes

          # calendario isométrico de actividad del último año
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
