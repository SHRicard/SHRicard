name: Metrics

on:
  # update once a day
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # generates github-metrics.svg and commits it to this repo (master branch)
      - name: generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # Usa el secret METRICS_TOKEN si existe; si no, cae al token automático de Actions.
          # 👉 Opcional: para datos más ricos (repos privados, etc.) creá un PAT y guardalo como METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: ${{ github.repository_owner }}
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          # que un plugin con error no tumbe toda la generación
          plugins_errors_fatal: no

          # lenguajes más usados
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # hábitos de código (¿programás de día o de noche?)
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_facts: yes

          # calendario isométrico de actividad del último año
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
